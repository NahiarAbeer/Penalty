<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="images/logo.png">
    <meta property="og:image" content="logo.png">
    <meta property="og:type" content="website">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Round 1: Impossible?</title>
    <link rel="stylesheet" href="styles.css">

</head>

<body>
    <div id="app">
        <div id="phone">
            <canvas id="game"></canvas>
            <div class="hud">
                <div class="chip"><span>Goals</span><b id="score">0</b></div>
                <div class="chip"><span>Shots</span><b id="shots">10</b></div>
                <div class="chip" style ="display: hidden;"><span>Status</span><b id="status">Ready</b></div>
            </div>
            <div class="centerTitle" id="title">
                
            </div>
            <div class="hint" id="hint">Drag from the ball to shoot. The keeper reads every normal shot.</div>
            <div class="overlay" id="start">
                <div class="card">
                    <h2>Impossible Keeper?</h2>
                    <p>Welcome to my Website :3
                        <br>
                        I hope You are tired of reloading website.No? Then get ready to sweat.
                        <br>
                        BEST OF LUCK
                        
                    </p>
                    <button id="play">START MATCH</button>
                </div>
            </div>
            <div class="toast" id="toast"></div>
        </div>
    </div>
    <script src="script.js"></script>

    
</body>

</html>
